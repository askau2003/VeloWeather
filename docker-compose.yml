services:
  backend:
    build: .
    command: uvicorn velo_weather.backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - TZ=Europe/Copenhagen

  frontend:
    build: .
    command: streamlit run velo_weather/frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - ./.env
    environment:
      - TZ=Europe/Copenhagen
    depends_on:
      - backend